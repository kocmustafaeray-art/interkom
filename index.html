<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideCom Pro v3</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #e0e0e0; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            padding: 20px;
        }

        .header h1 {
            font-size: 26px;
            color: #ff9800;
            text-align: center;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .status-panel {
            background: #1e1e1e;
            border-left: 5px solid #555;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin: 15px 0;
        }

        .status-ready { border-left-color: #00e676; color: #00e676; }
        .status-connected { border-left-color: #29b6f6; color: #29b6f6; animation: pulse 2s infinite; }
        .status-error { border-left-color: #ff1744; color: #ff1744; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .id-section {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .id-value { font-size: 18px; font-weight: bold; color: #ff9800; word-break: break-all; display: block; margin-bottom: 10px; }

        .btn {
            width: 100%;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn:active { transform: scale(0.98); }
        .btn-copy { background: #37474f; color: white; padding: 12px; font-size: 14px; }
        .btn-connect { background: #ff9800; color: #121212; margin-top: 10px; }
        
        /* Yeni Sürüş Kontrol Butonları */
        .btn-mute { background: #0288d1; color: white; display: none; }
        .btn-muted { background: #d32f2f; color: white; animation: pulse 1s infinite; }
        .btn-disconnect { background: #b71c1c; color: white; display: none; }

        .input-group { margin: 15px 0; }
        input[type="text"] {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            background: #2d2d2d;
            border: 2px solid #444;
            color: white;
            border-radius: 12px;
            text-align: center;
            outline: none;
        }
        input[type="text"]:focus { border-color: #ff9800; }
        
        .footer { text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏍️ RIDE COM PRO</h1>
    </div>

    <div class="status-panel" id="status-box">Durum: Sistem Başlatılıyor...</div>

    <div class="id-section" id="id-panel">
        <span style="font-size: 12px; color: #aaa;">KODUNUZ</span>
        <span id="my-id" class="id-value font-mono">Oluşturuluyor...</span>
        <button class="btn btn-copy" onclick="kodKopyala()">Kodu Kopyala</button>
    </div>

    <div class="input-group" id="setup-controls">
        <input type="text" id="peer-id" placeholder="Arkadaşının Kodunu Yapıştır">
        <button class="btn btn-connect" onclick="arkadasiAra()">Yolculuğu Başlat</button>
    </div>

    <div id="ride-controls">
        <button class="btn btn-mute" id="mute-btn" onclick="sesiSustur()">🎤 MİKROFONU SUSTUR</button>
        <button class="btn btn-disconnect" id="disconnect-btn" onclick="baglantiyiKes()">❌ YOLCULUĞU BİTİR (AYRIL)</button>
    </div>

    <div class="footer">v3.0 - Güvenli Sürüş Paneli</div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        let localStream;
        let currentCall = null;
        let isMuted = false;
        const peer = new Peer(); 
        
        const statusBox = document.getElementById('status-box');
        const muteBtn = document.getElementById('mute-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const setupControls = document.getElementById('setup-controls');
        const idPanel = document.getElementById('id-panel');

        function durumGuncelle(mesaj, tip) {
            statusBox.innerText = mesaj;
            statusBox.className = "status-panel " + tip;
        }

        // Mikrofonu ve ses kalitesi ayarlarını yükle
        navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
            video: false 
        }).then(stream => {
            localStream = stream;
            durumGuncelle("BAĞLANTIYA HAZIR", "status-ready");
        }).catch(err => {
            durumGuncelle("MİKROFON İZNİ ALINAMADI!", "status-error");
        });

        peer.on('open', id => { document.getElementById('my-id').innerText = id; });

        // Arayüzü Sürüş Moduna Geçir (Butonları göster/gizle)
        function surusModu(aktif) {
            if(aktif) {
                setupControls.style.display = "none";
                idPanel.style.display = "none";
                muteBtn.style.display = "block";
                disconnectBtn.style.display = "block";
            } else {
                setupControls.style.display = "block";
                idPanel.style.display = "block";
                muteBtn.style.display = "none";
                disconnectBtn.style.display = "none";
                isMuted = false;
                muteBtn.innerText = "🎤 MİKROFONU SUSTUR";
                muteBtn.className = "btn btn-mute";
                if(localStream) localStream.getAudioTracks()[0].enabled = true;
            }
        }

        // Gelen Aramayı Yönet
        peer.on('call', call => {
            currentCall = call;
            durumGuncelle("BAĞLANTI AKTİF", "status-connected");
            surusModu(true);
            
            call.answer(localStream);
            call.on('stream', remoteStream => {
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
            call.on('close', () => { baglantiyiKes(); });
        });

        // Arama Yapma
        function arkadasiAra() {
            const id = document.getElementById('peer-id').value;
            if(!id) return alert("Lütfen kod girin!");

            durumGuncelle("ARANIYOR...", "status-ready");
            currentCall = peer.call(id, localStream);

            currentCall.on('stream', remoteStream => {
                durumGuncelle("BAĞLANTI AKTİF", "status-connected");
                surusModu(true);
                document.getElementById('remote-audio').srcObject = remoteStream;
            });
            currentCall.on('close', () => { baglantiyiKes(); });
        }

        // SUSTURMA (MUTE) FONKSİYONU
        function sesiSustur() {
            if(!localStream) return;
            
            isMuted = !isMuted;
            // Mikrofon kanalını kapatıp açar
            localStream.getAudioTracks()[0].enabled = !isMuted; 

            if(isMuted) {
                muteBtn.innerText = "🔇 MİKROFON KAPALI (SESİN GİTMİYOR)";
                muteBtn.className = "btn btn-mute btn-muted";
            } else {
                muteBtn.innerText = "🎤 MİKROFONU SUSTUR";
                muteBtn.className = "btn btn-mute";
            }
        }

        // AYRILMA / KAPATMA FONKSİYONU
        function baglantiyiKes() {
            if(currentCall) {
                currentCall.close();
                currentCall = null;
            }
            document.getElementById('remote-audio').srcObject = null;
            durumGuncelle("BAĞLANTIYA HAZIR", "status-ready");
            surusModu(false);
        }

        function kodKopyala() {
            const idText = document.getElementById('my-id').innerText;
            if(idText === "Oluşturuluyor...") return;
            navigator.clipboard.writeText(idText).then(() => { alert("Kod kopyalandı!"); });
        }
    </script>
</body>
</html>
