<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Motorda arkadaşınızla sesli bağlantı ve GPS paylaşımı için web uygulaması.">
    <title>RideCom OS v12 Pro</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; justify-content: space-between; min-height: 100vh; padding: 15px; padding-top: calc(15px + env(safe-area-inset-top)); padding-bottom: calc(15px + env(safe-area-inset-bottom)); overflow-x: hidden; overscroll-behavior: none; touch-action: manipulation; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .header h1 { font-size: 20px; color: #ff9800; letter-spacing: 1px; }
        
        .settings-toggle { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; transition: background 0.2s; }
        .settings-toggle:active { background: #555; }
        
        .settings-panel { display: none; background: #1e1e1e; border: 2px solid #ff9800; border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .setting-row:last-child { border: none; }
        .switch { position: relative; display: inline-block; width: 45px; height: 25px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 25px; }
        .slider:before { position: absolute; content: ""; height: 17px; width: 17px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff9800; }
        input:checked + .slider:before { transform: translateX(20px); }

        #gps-panel { background: #1e1e1e; border-radius: 12px; padding: 10px; text-align: center; margin-bottom: 8px; border: 2px solid #333; transition: border-color 0.3s; }
        .speed-val { font-size: 45px; font-weight: 900; color: #00e676; line-height: 1; }
        .speed-unit { font-size: 12px; color: #888; margin-left: 3px; }
        .radar-warning { border-color: #ff1744 !important; animation: radarBlink 0.4s infinite alternate; }
        @keyframes radarBlink { from { background: #1e1e1e; } to { background: #b71c1c; } }

        #map-container { display: none; height: 180px; border-radius: 12px; margin-bottom: 8px; border: 2px solid #333; z-index: 1; }

        .status-panel { background: #1e1e1e; border-left: 5px solid #555; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 14px; margin-bottom: 8px; transition: border-color 0.3s; }
        .status-ready { border-left-color: #ff9800; color: #ff9800; }
        .status-connected { border-left-color: #00e676; color: #00e676; }
        .status-error { border-left-color: #ff1744; color: #ff1744; }

        .hud-container { background: #1e1e1e; padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        .hud-title { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .user-list { list-style: none; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #2d2d2d; margin-bottom: 5px; border-radius: 6px; font-weight: bold; font-size: 13px; }
        .user-status { font-size: 11px; padding: 2px 5px; border-radius: 4px; }
        
        .vu-meter { width: 35px; height: 6px; background: #444; border-radius: 3px; display: inline-block; margin-left: 5px; overflow: hidden; vertical-align: middle; }
        .vu-bar { height: 100%; width: 0%; background: #00e676; transition: width 0.1s; }

        .status-offline { background: #555; color: #aaa; }
        .status-speaking { background: #0288d1; color: white; }
        .btn-muted { background: #d32f2f; color: white; }

        .room-section { background: #1e1e1e; padding: 15px; border-radius: 12px; text-align: center; }
        .button-row { display: flex; gap: 8px; }
        .button-row .btn { flex: 1; }
        .btn { width: 100%; padding: 18px; min-height: 50px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-join { background: #ff9800; color: #121212; margin-top: 10px; }
        .btn-mute { background: #0288d1; color: white; display: none; }
        .btn-disconnect { background: #b71c1c; color: white; display: none; }
        
        input { width: 100%; padding: 12px; font-size: 15px; background: #2d2d2d; border: 2px solid #444; color: white; border-radius: 8px; text-align: center; outline: none; margin-bottom: 8px; transition: border-color 0.2s; min-height: 46px; }
        input:focus { border-color: #ff9800; }
        #dimmer-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 9999; justify-content: center; align-items: center; color: #444; font-size: 13px; padding: 20px; text-align: center; }

        @media (max-width: 480px) {
            body { padding: 12px; padding-top: calc(12px + env(safe-area-inset-top)); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
            .header h1 { font-size: 18px; }
            .speed-val { font-size: 38px; }
            .btn { padding: 15px; font-size: 15px; }
        }
    </style>
</head>
<body>

    <div id="dimmer-layer" onclick="ekraniUyandir()">[ Pil Tasarrufu Aktif - Dokun ]</div>

    <div class="header">
        <h1>🏍️ RIDECOM OS</h1>
        <button class="settings-toggle" onclick="ayarlariAcKapat()">⚙️ AYARLAR</button>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="setting-row"><span>GPS Kadranı Göster</span><label class="switch"><input type="checkbox" id="cfg-gps" checked onchange="toggleFeature('gps-panel', this.checked)"><span class="slider"></span></label></div>
        <div class="setting-row"><span>Grup Haritası Göster</span><label class="switch"><input type="checkbox" id="cfg-map" checked onchange="toggleFeature('map-container', this.checked)"><span class="slider"></span></label></div>
        <div class="setting-row"><span>Akıllı Rüzgar Filtresi</span><label class="switch"><input type="checkbox" id="cfg-filter" checked><span class="slider"></span></label></div>
        <div class="setting-row"><span>Hıza Duyarlı Oto-Ses</span><label class="switch"><input type="checkbox" id="cfg-autovol" checked><span class="slider"></span></label></div>
        <div class="setting-row"><span>Pil Tasarrufu (15sn)</span><label class="switch"><input type="checkbox" id="cfg-battery" checked><span class="slider"></span></label></div>
    </div>

    <div class="gps-hud" id="gps-panel">
        <span class="speed-val" id="speed-display">0</span><span class="speed-unit">km/h</span>
    </div>

    <div id="map-container"></div>

    <div class="status-panel" id="status-box">Mikrofon izni bekleniyor...</div>

    <div class="hud-container">
        <span class="hud-title">📊 Grup HUD & Cihazlar</span>
        <ul class="user-list" id="user-list"><li style="color:#666; font-style:italic; font-size:12px; text-align:center;">Giriş bekleniyor.</li></ul>
    </div>

    <div class="room-section" id="room-panel">
        <input type="text" id="rider-name" placeholder="Sürücü Adınız">
        <input type="text" id="room-code" placeholder="Oda Kodu (örn. ride42)">
        <input type="number" id="speed-limit" placeholder="Radar Limiti (Opsiyonel)">
        <div class="button-row">
            <button class="btn btn-join" id="btn-create" onclick="odaOlustur()">ODA OLUŞTUR</button>
            <button class="btn btn-join" id="btn-join" onclick="odayaKatil()">ODAYA KATIL</button>
        </div>
    </div>

    <div id="ride-controls">
        <button class="btn btn-mute" id="mute-btn" onclick="sesiSustur()">🎤 MİKROFONU SUSTUR</button>
        <button class="btn btn-disconnect" id="disconnect-btn" onclick="odadanAyril()">❌ ODADAN AYRIL</button>
    </div>

    <audio id="remote-audio-1" autoplay playsinline></audio>
    <audio id="remote-audio-2" autoplay playsinline></audio>

    <script>
        let localStream = null, isMuted = false, peer = null, audioCtx = null;
        let myName = "", roomCode = "", myPeerId = "", remotePeerId = "";
        let currentSpeed = 0, speedLimit = 0;
        let map = null, myMarker = null, remoteMarker = null;
        let dimmerTimeout = null, vuInterval = null, syncInterval = null, gpsWatchId = null, filterHoldTimeout = null;
        let remoteUser = null, remoteConn = null;

        const DOM = {
            status: document.getElementById('status-box'),
            muteBtn: document.getElementById('mute-btn'),
            discBtn: document.getElementById('disconnect-btn'),
            roomPanel: document.getElementById('room-panel'),
            userList: document.getElementById('user-list'),
            dimmer: document.getElementById('dimmer-layer'),
            createBtn: document.getElementById('btn-create'),
            joinBtn: document.getElementById('btn-join')
        };

        function durumGuncelle(mesaj, tip) {
            DOM.status.innerText = mesaj;
            DOM.status.className = "status-panel " + tip;
        }

        function ayarlariAcKapat() {
            let panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === "block" ? "none" : "block";
        }

        function toggleFeature(elementId, isVisible) {
            let el = document.getElementById(elementId);
            el.style.display = isVisible ? "block" : "none";
            if(elementId === "map-container" && isVisible && map) {
                setTimeout(() => map.invalidateSize(), 200);
            }
        }

        function sanitizeRoomCode(value) {
            return String(value || '').trim().toLowerCase().replace(/[^a-z0-9-_]/g, '').slice(0, 20);
        }

        function generateRoomCode() {
            return 'ride' + Math.floor(1000 + Math.random() * 9000);
        }

        async function ensureMicrophoneReady() {
            if (localStream) return true;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
                    video: false
                });
                localStream = stream;
                durumGuncelle("MİKROFON HAZIR. BAĞLANTIYI BAŞLATIN.", "status-ready");
                return true;
            } catch (err) {
                console.error(err);
                durumGuncelle("MİKROFON İZNİ REDDEDİLDİ!", "status-error");
                return false;
            }
        }

        async function odaOlustur() {
            myName = document.getElementById('rider-name').value.trim();
            speedLimit = parseInt(document.getElementById('speed-limit').value) || 0;
            roomCode = sanitizeRoomCode(document.getElementById('room-code').value) || generateRoomCode();

            if (!myName) return alert("Lütfen adınızı yazın!");
            if (!await ensureMicrophoneReady()) return;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            setupVUMeter(localStream);
            setupGPSAndMap();
            setupMediaSession();
            startPeer(`${roomCode}-host`, 'host');
        }

        async function odayaKatil() {
            myName = document.getElementById('rider-name').value.trim();
            speedLimit = parseInt(document.getElementById('speed-limit').value) || 0;
            roomCode = sanitizeRoomCode(document.getElementById('room-code').value);

            if (!myName) return alert("Lütfen adınızı yazın!");
            if (!roomCode) return alert("Oda kodu girin!");
            if (!await ensureMicrophoneReady()) return;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            setupVUMeter(localStream);
            setupGPSAndMap();
            setupMediaSession();
            startPeer(`${roomCode}-guest`, 'guest', `${roomCode}-host`);
        }

        function startPeer(peerId, mode, targetPeerId = "") {
            if (peer) peer.destroy();

            myPeerId = peerId;
            [DOM.createBtn, DOM.joinBtn].forEach(btn => btn && (btn.disabled = true));
            durumGuncelle(mode === 'host' ? "ODA HAZIRLANIYOR..." : "BAĞLANIYOR...", "status-ready");

            peer = new Peer(peerId, {
                host: '0.peerjs.com',
                port: 443,
                secure: true,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                surusModu(true);
                hudGuncelle();
                pilTasarrufuZamanlayiciBaslat();

                if (mode === 'host') {
                    durumGuncelle(`ODA HAZIR. KOD: ${roomCode}`, "status-ready");
                } else {
                    connectToPeer(targetPeerId);
                    durumGuncelle("ARKADAŞINIZA BAĞLANILIYOR...", "status-ready");
                }
            });

            peer.on('call', call => {
                call.answer(localStream);
                handleIncomingCall(call);
            });

            peer.on('connection', conn => {
                setupDataConnection(conn);
            });

            peer.on('error', err => {
                console.error(err);
                durumGuncelle("BAĞLANTI HATASI", "status-error");
                [DOM.createBtn, DOM.joinBtn].forEach(btn => btn && (btn.disabled = false));
            });

            peer.on('disconnected', () => {
                durumGuncelle("AĞ KOPTU, YENİDEN BAĞLANILIYOR...", "status-error");
                peer.reconnect();
            });
        }

        function connectToPeer(targetPeerId) {
            const conn = peer.connect(targetPeerId);
            setupDataConnection(conn);
            const call = peer.call(targetPeerId, localStream);
            handleIncomingCall(call);
        }

        function handleIncomingCall(call) {
            call.on('stream', stream => {
                const audioEl = document.getElementById('remote-audio-1');
                if (audioEl) {
                    audioEl.srcObject = stream;
                    audioEl.play().catch(() => {});
                }
                durumGuncelle("SES BAĞLANTISI AKTİF", "status-connected");
            });
        }

        function setupDataConnection(conn) {
            remoteConn = conn;
            remotePeerId = conn.peer;

            conn.on('open', () => {
                sendSync();
                syncInterval = setInterval(sendSync, 3000);
            });

            conn.on('data', data => {
                if (data.type === 'sync') {
                    remoteUser = { name: data.name, muted: data.muted, lat: data.lat, lng: data.lng };
                    durumGuncelle("BAĞLANTI AKTİF", "status-connected");
                    hudGuncelle();
                    updateMapMarkers();
                }
            });

            conn.on('close', () => {
                clearInterval(syncInterval);
                remoteUser = null;
                hudGuncelle();
                updateMapMarkers();
                durumGuncelle("ARKADAŞ AYRILDI", "status-error");
            });
        }

        function sendSync() {
            if (remoteConn && remoteConn.open) {
                const loc = myMarker ? myMarker.getLatLng() : { lat: null, lng: null };
                remoteConn.send({ type: 'sync', name: myName, muted: isMuted, lat: loc.lat, lng: loc.lng });
            }
        }

        function hudGuncelle() {
            DOM.userList.innerHTML = "";

            const liMe = document.createElement('li');
            liMe.className = 'user-item';
            liMe.innerHTML = `<span>👤 ${myName || 'Sen'} (Sen)</span> <span class="user-status ${isMuted ? 'btn-muted' : 'status-speaking'}">${isMuted ? 'MUTED' : 'KONUŞUYOR'}<div class="vu-meter"><div class="vu-bar" id="my-vu"></div></div></span>`;
            DOM.userList.appendChild(liMe);

            if (remoteUser) {
                const liRemote = document.createElement('li');
                liRemote.className = 'user-item';
                liRemote.innerHTML = `<span>🏍️ ${remoteUser.name || 'Arkadaş'}</span> <span class="user-status ${remoteUser.muted ? 'btn-muted' : 'status-speaking'}">${remoteUser.muted ? 'MUTED' : 'BAĞLI'}</span>`;
                DOM.userList.appendChild(liRemote);
            } else {
                const liEmpty = document.createElement('li');
                liEmpty.className = 'user-item';
                liEmpty.innerHTML = '<span>⏳ Bağlantı bekleniyor</span><span class="user-status status-offline">BEKLEMEDE</span>';
                DOM.userList.appendChild(liEmpty);
            }
        }

        function setupVUMeter(stream) {
            if (vuInterval) clearInterval(vuInterval);

            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            vuInterval = setInterval(() => {
                if (!isMuted && peer && !peer.destroyed) {
                    analyser.getByteFrequencyData(dataArray);
                    let total = 0;
                    for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                    let volume = (total / dataArray.length) * 3;

                    if (document.getElementById('cfg-filter').checked) {
                        if (volume > 12) {
                            localStream.getAudioTracks()[0].enabled = true;
                            clearTimeout(filterHoldTimeout);
                            filterHoldTimeout = setTimeout(() => {
                                if (!isMuted) localStream.getAudioTracks()[0].enabled = false;
                            }, 1500);
                        }
                    } else if (!isMuted) {
                        localStream.getAudioTracks()[0].enabled = true;
                    }

                    const bar = document.getElementById('my-vu');
                    if (bar) bar.style.width = Math.min(volume, 100) + '%';
                }
            }, 100);
        }

        function setupGPSAndMap() {
            if (!map) {
                map = L.map('map-container').setView([41.0082, 28.9784], 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            }

            if (!navigator.geolocation) {
                document.getElementById('speed-display').innerText = 'X';
                document.querySelector('.speed-unit').innerText = 'GPS Yok';
                return;
            }

            if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);

            gpsWatchId = navigator.geolocation.watchPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const speed = position.coords.speed;

                if (!myMarker) {
                    myMarker = L.marker([lat, lng]).addTo(map).bindPopup('Sen');
                } else {
                    myMarker.setLatLng([lat, lng]);
                }

                if (document.getElementById('cfg-map').checked) map.panTo([lat, lng]);

                if (speed !== null) {
                    currentSpeed = Math.round(speed * 3.6);
                    document.getElementById('speed-display').innerText = currentSpeed;

                    const gpsPanel = document.getElementById('gps-panel');
                    if (speedLimit > 0 && currentSpeed > speedLimit) {
                        gpsPanel.className = 'gps-hud radar-warning';
                    } else {
                        gpsPanel.className = 'gps-hud';
                    }

                    if (document.getElementById('cfg-autovol').checked) {
                        const volFactor = currentSpeed > 80 ? 1.0 : (currentSpeed > 40 ? 0.8 : 0.6);
                        ['remote-audio-1', 'remote-audio-2'].forEach(id => {
                            const el = document.getElementById(id);
                            if (el) el.volume = volFactor;
                        });
                    }
                }
            }, err => {
                let hataMesaji = 'Hata';
                if (err.code === 1) hataMesaji = 'İzin Yok';
                if (err.code === 2) hataMesaji = 'Sinyal Yok';
                if (err.code === 3) hataMesaji = 'Zaman Aşımı';

                document.getElementById('speed-display').innerText = '!';
                document.querySelector('.speed-unit').innerText = hataMesaji;
                console.warn('GPS Hatası:', err.message);
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        }

        function updateMapMarkers() {
            if (!map) return;
            if (remoteUser && remoteUser.lat && remoteUser.lng) {
                if (!remoteMarker) {
                    remoteMarker = L.marker([remoteUser.lat, remoteUser.lng]).addTo(map).bindPopup(remoteUser.name || 'Arkadaş');
                } else {
                    remoteMarker.setLatLng([remoteUser.lat, remoteUser.lng]);
                }
            }
        }

        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', () => sesiSustur());
                navigator.mediaSession.setActionHandler('pause', () => sesiSustur());
            }
        }

        function pilTasarrufuZamanlayiciBaslat() {
            clearTimeout(dimmerTimeout);
            if (!document.getElementById('cfg-battery').checked) return;
            dimmerTimeout = setTimeout(() => {
                if (peer) DOM.dimmer.style.display = 'flex';
            }, 15000);
        }

        function ekraniUyandir() {
            DOM.dimmer.style.display = 'none';
            pilTasarrufuZamanlayiciBaslat();
        }

        function surusModu(aktif) {
            DOM.roomPanel.style.display = aktif ? 'none' : 'block';
            DOM.muteBtn.style.display = aktif ? 'block' : 'none';
            DOM.discBtn.style.display = aktif ? 'block' : 'none';
            toggleFeature('gps-panel', document.getElementById('cfg-gps').checked && aktif);
            toggleFeature('map-container', document.getElementById('cfg-map').checked && aktif);

            if (!aktif) {
                isMuted = false;
                remoteUser = null;
                remoteConn = null;
                remotePeerId = '';
                hudGuncelle();
                [DOM.createBtn, DOM.joinBtn].forEach(btn => btn && (btn.disabled = false));
            }
        }

        function sesiSustur() {
            if (!localStream) return;
            isMuted = !isMuted;

            if (isMuted) clearTimeout(filterHoldTimeout);

            localStream.getAudioTracks()[0].enabled = !isMuted;
            DOM.muteBtn.innerText = isMuted ? '🔇 SESİN GİTMİYOR' : '🎤 MİKROFONU SUSTUR';
            DOM.muteBtn.className = isMuted ? 'btn btn-mute btn-muted' : 'btn btn-mute';
            hudGuncelle();
            pilTasarrufuZamanlayiciBaslat();
        }

        function odadanAyril() {
            clearInterval(vuInterval);
            clearInterval(syncInterval);
            clearTimeout(dimmerTimeout);
            clearTimeout(filterHoldTimeout);
            if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId);

            if (peer) peer.destroy();

            document.getElementById('remote-audio-1').srcObject = null;
            document.getElementById('remote-audio-2').srcObject = null;

            durumGuncelle('ODADAN AYRILDINIZ', 'status-ready');
            surusModu(false);
        }

        document.body.addEventListener('click', () => {
            if (peer) pilTasarrufuZamanlayiciBaslat();
        });

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
