<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RideCom Ultimate v10</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; color: #e0e0e0; 
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 100vh; padding: 20px;
        }
        .header h1 { font-size: 24px; color: #ff9800; text-align: center; letter-spacing: 2px; }
        
        /* [YENİ] GPS HIZ KADRANI HUD */
        .gps-hud { background: #1e1e1e; border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 10px; border: 2px solid #333; }
        .speed-val { font-size: 58px; font-weight: 900; color: #00e676; display: inline-block; line-height: 1; }
        .speed-unit { font-size: 14px; color: #888; margin-left: 5px; font-weight: bold; }
        .radar-warning { border-color: #ff1744 !important; animation: radarBlink 0.5s infinite alternate; }
        .radar-warning .speed-val { color: #ff1744; }
        @keyframes radarBlink { from { background: #1e1e1e; } to { background: #b71c1c; } }

        .status-panel { background: #1e1e1e; border-left: 5px solid #555; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 15px; margin: 10px 0; }
        .status-ready { border-left-color: #ff9800; color: #ff9800; }
        .status-connected { border-left-color: #00e676; color: #00e676; }
        .status-error { border-left-color: #ff1744; color: #ff1744; }

        .hud-container { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .hud-title { font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .user-list { list-style: none; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #2d2d2d; margin-bottom: 6px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .user-status { font-size: 11px; padding: 3px 6px; border-radius: 4px; }
        
        .vu-meter { width: 40px; height: 6px; background: #444; border-radius: 3px; display: inline-block; margin-left: 8px; overflow: hidden; vertical-align: middle; }
        .vu-bar { height: 100%; width: 0%; background: #00e676; transition: width 0.1s; }

        .status-offline { background: #555; color: #aaa; }
        .status-speaking { background: #0288d1; color: white; }
        .btn-muted { background: #d32f2f; color: white; }

        .room-section { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; margin: 10px 0; }
        .btn { width: 100%; padding: 20px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .btn-join { background: #ff9800; color: #121212; margin-top: 15px; }
        .btn-mute { background: #0288d1; color: white; display: none; }
        .btn-disconnect { background: #b71c1c; color: white; display: none; }
        
        input { width: 100%; padding: 15px; font-size: 16px; background: #2d2d2d; border: 2px solid #444; color: white; border-radius: 8px; text-align: center; outline: none; margin-bottom: 10px; }
        #dimmer-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 9999; justify-content: center; align-items: center; color: #444; font-size: 14px; }
        .footer { text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div id="dimmer-layer" onclick="ekraniUyandir()">
        [ Pil Tasarrufu Aktif - Dokun ve Uyandır ]
    </div>

    <div class="header">
        <h1>🏍️ RIDE COM ULTIMATE</h1>
    </div>

    <div class="gps-hud" id="gps-panel">
        <span class="speed-val" id="speed-display">0</span><span class="speed-unit">km/h</span>
    </div>

    <div class="status-panel" id="status-box">Sistem Başlatılıyor...</div>

    <div class="hud-container">
        <span class="hud-title">📊 Kask HUD Paneli (Grup Modu)</span>
        <ul class="user-list" id="user-list">
            <li style="color: #666; font-style: italic; font-size: 13px; text-align: center;" id="no-user-text">Oda başlatılmadı.</li>
        </ul>
    </div>

    <div class="room-section" id="room-panel">
        <input type="text" id="rider-name" placeholder="Sürücü Adınız">
        <input type="number" id="speed-limit" placeholder="Radar Uyarı Limiti (Örn: 80)" style="font-size:14px; padding:10px;">
        <button class="btn btn-join" id="join-btn" onclick="odayaBaglan()">Odaya Gir ve Gruba Katıl</button>
    </div>

    <div id="ride-controls">
        <button class="btn btn-mute" id="mute-btn" onclick="sesiSustur()">🎤 MİKROFONU SUSTUR</button>
        <button class="btn btn-disconnect" id="disconnect-btn" onclick="odadanAyril()">❌ ODADAN AYRIL</button>
    </div>

    <div class="footer">v10.0 - GPS HUD & 3-Way Interkom & Bluetooth Fix</div>

    <audio id="remote-audio-1" autoplay playsinline></audio>
    <audio id="remote-audio-2" autoplay playsinline></audio>

    <script>
        let localStream, isMuted = false;
        let peer = null;
        let myName = "", myRole = "";
        let groupUsers = {}; // Odadaki herkesi tutan liste
        let dimmerTimeout = null, speedLimit = 0;
        
        const d = new Date();
        const zamanDamgasi = d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate() + "-" + d.getHours();
        
        // 3 Benzersiz Rol (Sürücü 1, Sürücü 2, Artçı/Sürücü 3)
        const ROLLER = [
            "rider-role-id-a-" + zamanDamgasi,
            "rider-role-id-b-" + zamanDamgasi,
            "rider-role-id-c-" + zamanDamgasi
        ];

        const statusBox = document.getElementById('status-box');
        const muteBtn = document.getElementById('mute-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const roomPanel = document.getElementById('room-panel');
        const joinBtn = document.getElementById('join-btn');
        const userList = document.getElementById('user-list');
        const dimmerLayer = document.getElementById('dimmer-layer');

        function durumGuncelle(mesaj, tip) {
            statusBox.innerText = mesaj;
            statusBox.className = "status-panel " + tip;
        }

        // [MÜZİK KİLİDİNİ AÇAN KRİTİK GÜNCELLEME]
        // Tarayıcıya diğer müzikleri kapatmamasını, onlarla MIX olmasını emrediyoruz
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.audioWorklet) {
            // Arka planda ses çalma odağını esneten tarayıcı ayarı
            navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: true, noiseSuppression: true, autoGainControl: true,
                    channelCount: 1, sampleRate: 44100
                }, video: false 
            }).then(stream => {
                localStream = stream;
                durumGuncelle("GRUBA KATILMAYA HAZIR", "status-ready");
                setupVUMeter(stream);
                setupGPS(); // GPS Başlat
                setupMediaSession(); // Bluetooth Kulaklık Tuşlarını Dinle
            }).catch(() => durumGuncelle("MİKROFON İZNİ EKSİK!", "status-error"));
        }

        function hudGuncelle() {
            userList.innerHTML = "";
            // Kendimiz
            let li = document.createElement('li');
            li.className = "user-item";
            li.innerHTML = `<span>👤 ${myName} (Sen)</span> <span class="user-status ${isMuted ? 'btn-muted' : 'status-speaking'}">${isMuted ? 'MUTED' : 'KONUŞUYOR'}<div class="vu-meter"><div class="vu-bar" id="my-vu"></div></div></span>`;
            userList.appendChild(li);

            // Gruptaki Diğerleri
            ROLLER.forEach((role, idx) => {
                if(role !== myRole) {
                    let u = groupUsers[role];
                    let liX = document.createElement('li');
                    liX.className = "user-item";
                    liX.innerHTML = `<span>🏍️ ${u ? u.name : 'Sürücü ' + (idx+1)}</span> <span class="user-status ${u ? (u.muted ? 'btn-muted' : 'status-speaking') : 'status-offline'}">${u ? (u.muted ? 'MUTED' : 'BAĞLI') : 'YOLDA (GELMEDİ)'}</span>`;
                    userList.appendChild(liX);
                }
            });
        }

        function odayaBaglan() {
            myName = document.getElementById('rider-name').value.trim();
            speedLimit = parseInt(document.getElementById('speed-limit').value) || 0;
            if(!myName) return alert("Lütfen adınızı yazın!");

            durumGuncelle("GİRİŞ YAPILIYOR...", "status-ready");
            joinBtn.disabled = true;
            tryConnect(0); // 1. Rolü kapmaya çalış
        }

        // [YENİ] 3 Kişilik Mesh Bağlantı Döngüsü
        function tryConnect(roleIdx) {
            if(roleIdx >= ROLLER.length) {
                durumGuncelle("ODA DOLU!", "status-error");
                joinBtn.disabled = false;
                return;
            }

            myRole = ROLLER[roleIdx];
            peer = new Peer(myRole, { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });

            peer.on('open', () => {
                durumGuncelle("GRUP ODASINDASIN", "status-ready");
                surusModu(true);
                hudGuncelle();
                pilTasarrufuZamanlayiciBaslat();

                // Odadaki diğer muhtemel rollerle el sıkışmayı dene
                ROLLER.forEach(targetRole => {
                    if(targetRole !== myRole) {
                        let call = peer.call(targetRole, localStream);
                        if(call) handleCall(call, targetRole);
                        let conn = peer.connect(targetRole);
                        if(conn) handleData(conn, targetRole);
                    }
                });
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    tryConnect(roleIdx + 1); // Sıradaki rolü dene (B veya C)
                }
            });

            peer.on('call', call => { call.answer(localStream); handleCall(call, call.peer); });
            peer.on('connection', conn => { handleData(conn, conn.peer); });
        }

        function handleCall(call, roleId) {
            call.on('stream', rStream => {
                let slot = (roleId === ROLLER[0] || (roleId === ROLLER[1] && myRole === ROLLER[2])) ? "1" : "2";
                document.getElementById('remote-audio-' + slot).srcObject = rStream;
                if(!groupUsers[roleId]) groupUsers[roleId] = { name: "Arkadaşın", muted: false };
                hudGuncelle();
            });
        }

        function handleData(conn, roleId) {
            conn.on('open', () => { conn.send({ type: 'sync', name: myName, muted: isMuted }); });
            conn.on('data', data => {
                if(data.type === 'sync') {
                    groupUsers[roleId] = { name: data.name, muted: data.muted };
                    durumGuncelle("GRUP AKTİF", "status-connected");
                    hudGuncelle();
                }
            });
        }

        // [YENİ] GPS HIZ TAKİBİ & RADAR SİSTEMİ
        function setupGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(position => {
                let speedInMs = position.coords.speed; // m/s cinsinden gelir
                if (speedInMs !== null && speedInMs > 0) {
                    let kmh = Math.round(speedInMs * 3.6);
                    document.getElementById('speed-display').innerText = kmh;
                    
                    // Radar uyarısı tetikleme
                    let gpsPanel = document.getElementById('gps-panel');
                    if(speedLimit > 0 && kmh > speedLimit) {
                        gpsPanel.className = "gps-hud radar-warning";
                    } else {
                        gpsPanel.className = "gps-hud";
                    }
                }
            }, () => {}, { enableHighAccuracy: true });
        }

        // [YENİ] BLUETOOTH KULAKLIK / İNTERKOM DÜĞME DESTEĞİ
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                // Kask interkomundaki "Şarkıyı durdur/oynat" tuşuna basınca Mute tetiklenir!
                navigator.mediaSession.setActionHandler('play', () => sesiSustur());
                navigator.mediaSession.setActionHandler('pause', () => sesiSustur());
            }
        }

        function setupVUMeter(stream) {
            let analyser = audioCtx.createAnalyser();
            let source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 64;
            let dataArray = new Uint8Array(analyser.frequencyBinCount);
            setInterval(() => {
                if (!isMuted && peer && !peer.destroyed) {
                    analyser.getByteFrequencyData(dataArray);
                    let total = 0; for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                    let volume = (total / dataArray.length) * 3;
                    let bar = document.getElementById('my-vu');
                    if(bar) bar.style.width = Math.min(volume, 100) + "%";
                }
            }, 100);
        }

        function pilTasarrufuZamanlayiciBaslat() {
            clearTimeout(dimmerTimeout);
            dimmerTimeout = setTimeout(() => { if(peer) dimmerLayer.style.display = "flex"; }, 15000);
        }

        function ekraniUyandir() { dimmerLayer.style.display = "none"; pilTasarrufuZamanlayiciBaslat(); }

        function surusModu(aktif) {
            roomPanel.style.display = aktif ? "none" : "block";
            muteBtn.style.display = aktif ? "block" : "none";
            disconnectBtn.style.display = aktif ? "block" : "none";
            if(!aktif) { joinBtn.disabled = false; groupUsers = {}; hudGuncelle(); }
        }

        function sesiSustur() {
            if(!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted; 
            muteBtn.innerText = isMuted ? "🔇 SESİN GİTMİYOR" : "🎤 MİKROFONU SUSTUR";
            muteBtn.className = isMuted ? "btn btn-mute btn-muted" : "btn btn-mute";
            hudGuncelle();
            pilTasarrufuZamanlayiciBaslat();
        }

        function odadanAyril() {
            clearTimeout(dimmerTimeout);
            if(peer) peer.destroy();
            document.getElementById('remote-audio-1').srcObject = null;
            document.getElementById('remote-audio-2').srcObject = null;
            durumGuncelle("ODAYA GİRMEYE HAZIR", "status-ready");
            surusModu(false);
        }
        document.body.addEventListener('click', () => { if(peer) pilTasarrufuZamanlayiciBaslat(); });
    </script>
</body>
</html>
