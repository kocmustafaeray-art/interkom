<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>İnterkom</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #121212; color: #e0e0e0; 
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 100vh; padding: 20px;
        }
        .header h1 { font-size: 26px; color: #ff9800; text-align: center; letter-spacing: 2px; margin-top: 10px; }
        .status-panel { background: #1e1e1e; border-left: 5px solid #555; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 16px; margin: 15px 0; }
        .status-ready { border-left-color: #ff9800; color: #ff9800; }
        .status-connected { border-left-color: #00e676; color: #00e676; animation: pulse 2s infinite; }
        .status-error { border-left-color: #ff1744; color: #ff1744; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }
        .room-section { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; margin: 15px 0; }
        .btn { width: 100%; padding: 22px; font-size: 18px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .btn-join { background: #ff9800; color: #121212; }
        .btn-mute { background: #0288d1; color: white; display: none; }
        .btn-muted { background: #d32f2f; color: white; animation: pulse 1s infinite; }
        .btn-disconnect { background: #b71c1c; color: white; display: none; }
        .footer { text-align: center; font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏍️Yolculuk</h1>
    </div>

    <div class="status-panel" id="status-box">Sistem Başlatılıyor...</div>

    <div class="room-section" id="room-panel">
        <span style="font-size: 12px; color: #aaa; display: block; margin-bottom: 5px;">BAĞLANILACAK ORTAK ODA</span>
        <h2 style="color: #ff9800; letter-spacing: 1px;">SÜRÜŞ ODASI ACTIVE</h2>
        <button class="btn btn-join" id="join-btn" style="margin-top: 20px;" onclick="odayaBaglan()">Odaya Gir ve Bağlan</button>
    </div>

    <div id="ride-controls">
        <button class="btn btn-mute" id="mute-btn" onclick="sesiSustur()">🎤 MİKROFONU SUSTUR</button>
        <button class="btn btn-disconnect" id="disconnect-btn" onclick="odadanAyril()">❌ ODADAN AYRIL</button>
    </div>

    <div class="footer">v7.0 - Akıllı Eşleşme Paneli</div>

    <audio id="remote-audio" autoplay playsinline></audio>

    <script>
        let localStream, currentCall, isMuted = false;
        let peer = null;
        
        // Sunucunun kafası karışmasın diye her saate özel taze oda kodları üretiyoruz
        const d = new Date();
        const zamanDamgasi = d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate() + "-" + d.getHours();
        
        // Cihazların kimlikleri (Biri A diğeri B olacak)
        const ODA_A = "ride-room-id-a-" + zamanDamgasi;
        const ODA_B = "ride-room-id-b-" + zamanDamgasi;
        
        const statusBox = document.getElementById('status-box');
        const muteBtn = document.getElementById('mute-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        const roomPanel = document.getElementById('room-panel');
        const joinBtn = document.getElementById('join-btn');

        function durumGuncelle(mesaj, tip) {
            statusBox.innerText = mesaj;
            statusBox.className = "status-panel " + tip;
        }

        navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, video: false 
        }).then(stream => {
            localStream = stream;
            durumGuncelle("ODAYA GİRMEYE HAZIR", "status-ready");
        }).catch(() => {
            durumGuncelle("MİKROFON İZNİ EKSİK!", "status-error");
        });

        function odayaBaglan() {
            durumGuncelle("BAĞLANTI ARANIYOR...", "status-ready");
            joinBtn.disabled = true;

            // Önce A kimliğiyle giriş yapmayı dene
            peer = new Peer(ODA_A, {
                config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
            });

            peer.on('open', () => {
                // Biz A olarak açıldık, şimdi karşı tarafın (B) girmesini bekliyoruz
                durumGuncelle("ODADA BEKLENİYOR... ARKADAŞININ BUTONA BASMASINI BEKLE", "status-ready");
                surusModu(true);
            });

            peer.on('error', (err) => {
                // Eğer A kimliği doluysa (yani PC veya telefon bu kodu kaptıysa) biz B olarak bağlanıp A'yı arıyoruz
                if (err.type === 'unavailable-id') {
                    peer.destroy();
                    
                    peer = new Peer(ODA_B, {
                        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }, { 'urls': 'stun:stun1.l.google.com:19302' }] }
                    });

                    peer.on('open', () => {
                        durumGuncelle("BAĞLANTI AKTİF!", "status-connected");
                        surusModu(true);
                        
                        // Doğrudan A'yı ara
                        currentCall = peer.call(ODA_A, localStream);
                        handleCall(currentCall);
                    });
                } else {
                    durumGuncelle("BAĞLANTI HATASI!", "status-error");
                    joinBtn.disabled = false;
                }
            });

            // Biz içeride beklerken B bize katılırsa burası tetiklenir
            peer.on('call', call => {
                currentCall = call;
                durumGuncelle("BAĞLANTI AKTİF!", "status-connected");
                surusModu(true);
                call.answer(localStream);
                handleCall(call);
            });
        }

        function handleCall(call) {
            call.on('stream', rStream => {
                const audio = document.getElementById('remote-audio');
                audio.srcObject = rStream;
                // iOS Safari için tetikleyici
                audio.play().catch(() => {
                    durumGuncelle("SESİ AÇMAK İÇİN EKRANA DOKUNUN!", "status-connected");
                });
            });
            call.on('close', () => { odadanAyril(); });
        }

        function surusModu(aktif) {
            roomPanel.style.display = aktif ? "none" : "block";
            muteBtn.style.display = aktif ? "block" : "none";
            disconnectBtn.style.display = aktif ? "block" : "none";
            if(!aktif) {
                joinBtn.disabled = false;
                isMuted = false;
                muteBtn.innerText = "🎤 MİKROFONU SUSTUR";
                muteBtn.className = "btn btn-mute";
                if(localStream) localStream.getAudioTracks()[0].enabled = true;
            }
        }

        function sesiSustur() {
            if(!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks()[0].enabled = !isMuted; 
            muteBtn.innerText = isMuted ? "🔇 SESİN GİTMİYOR (KAPALI)" : "🎤 MİKROFONU SUSTUR";
            muteBtn.className = isMuted ? "btn btn-mute btn-muted" : "btn btn-mute";
        }

        function odadanAyril() {
            if(currentCall) { currentCall.close(); currentCall = null; }
            if(peer) { peer.destroy(); peer = null; }
            document.getElementById('remote-audio').srcObject = null;
            durumGuncelle("ODAYA GİRMEYE HAZIR", "status-ready");
            surusModu(false);
        }
    </script>
</body>
</html>
